<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep blue gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6fe8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3fa8;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle inner glow on paper -->
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0ff;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient for the R -->
    <linearGradient id="rgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6fe8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3fa8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="papershadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="4" dy="6" stdDeviation="10" flood-color="#0a2060" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded rectangle background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern on background -->
  <g opacity="0.07" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Paper / note document with folded corner -->
  <g filter="url(#papershadow)">
    <!-- Main paper body -->
    <path d="M130 96 L330 96 L382 148 L382 416 L130 416 Z"
          fill="url(#paper)"/>
    <!-- Folded corner triangle -->
    <path d="M330 96 L330 148 L382 148 Z"
          fill="#c5d5f0"/>
    <!-- Fold shadow line -->
    <path d="M330 96 L330 148 L382 148"
          fill="none" stroke="#aabce0" stroke-width="1.5"/>
  </g>

  <!-- Horizontal lines on the note (ruled paper effect) -->
  <g stroke="#d0ddf5" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <line x1="162" y1="210" x2="310" y2="210"/>
    <line x1="162" y1="250" x2="310" y2="250"/>
    <line x1="162" y1="290" x2="310" y2="290"/>
    <line x1="162" y1="330" x2="280" y2="330"/>
  </g>

  <!-- Large stylized "R" letterform centered on the note -->
  <text x="200" y="200"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="138"
        fill="url(#rgrad)"
        opacity="0.92">R</text>

  <!-- Small "notes" text below -->
  <text x="174" y="382"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="600"
        font-size="28"
        letter-spacing="4"
        fill="#4a7dd4"
        opacity="0.85">NOTES</text>

  <!-- Pen / pencil accent in bottom-right corner -->
  <g transform="translate(320, 340) rotate(-38)">
    <!-- Pencil body -->
    <rect x="0" y="0" width="14" height="72" rx="3" fill="#ffd54f"/>
    <!-- Pencil tip -->
    <path d="M0 72 L7 92 L14 72 Z" fill="#f5a623"/>
    <!-- Pencil lead tip -->
    <path d="M4 88 L7 96 L10 88 Z" fill="#333"/>
    <!-- Pencil top eraser ferrule -->
    <rect x="0" y="0" width="14" height="6" rx="2" fill="#e0e0e0"/>
    <!-- Eraser -->
    <rect x="1" y="-8" width="12" height="8" rx="2" fill="#ff8a80"/>
  </g>

  <!-- Small sparkle/star accent top-left -->
  <g transform="translate(158, 138)" fill="#4a90e2" opacity="0.7">
    <polygon points="8,0 10,6 16,6 11,9 13,15 8,11 3,15 5,9 0,6 6,6" fill="#64b5f6"/>
  </g>
</svg>
