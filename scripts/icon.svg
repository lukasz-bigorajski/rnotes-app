<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6fe8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3fa8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6fe8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3fa8;stop-opacity:1" />
    </linearGradient>
    <filter id="papershadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="4" dy="6" stdDeviation="10" flood-color="#0a2060" flood-opacity="0.3"/>
    </filter>
    <filter id="pencilshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Paper / note document with folded corner -->
  <g filter="url(#papershadow)">
    <path d="M130 80 L330 80 L390 140 L390 430 L130 430 Z"
          fill="url(#paper)"/>
    <path d="M330 80 L330 140 L390 140 Z"
          fill="#c5d5f0"/>
    <path d="M330 80 L330 140 L390 140"
          fill="none" stroke="#aabce0" stroke-width="1.5"/>
  </g>

  <!-- Large stylized "R" centered on the note -->
  <text x="158" y="315"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="240"
        fill="url(#rgrad)"
        opacity="0.90">R</text>

  <!-- Large pencil in bottom-right, diagonal -->
  <g filter="url(#pencilshadow)" transform="translate(328, 195) rotate(38)">
    <!-- Pencil body -->
    <rect x="0" y="0" width="52" height="190" rx="8" fill="#ffd54f"/>
    <!-- Pencil wood tip section -->
    <path d="M0 190 L26 255 L52 190 Z" fill="#f5a623"/>
    <!-- Pencil lead tip -->
    <path d="M14 245 L26 268 L38 245 Z" fill="#333333"/>
    <!-- Pencil top eraser ferrule -->
    <rect x="0" y="0" width="52" height="18" rx="6" fill="#e0e0e0"/>
    <!-- Eraser -->
    <rect x="3" y="-26" width="46" height="26" rx="6" fill="#ff8a80"/>
    <!-- Pencil stripe detail -->
    <rect x="0" y="18" width="52" height="6" fill="#f0c030" opacity="0.6"/>
  </g>
</svg>
